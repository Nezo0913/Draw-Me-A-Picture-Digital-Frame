<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Drawing Canvas</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #f0f0f0;
    }

    h1 {
      margin-top: 20px;
    }

    #toolbar {
      margin: 10px;
    }

    button, select {
      padding: 8px;
      margin: 5px;
      cursor: pointer;
    }

    canvas {
      border: 2px solid black;
      background: white;
      cursor: crosshair;
    }

    /* STYLE OPTIONS */
    .dark {
      background: #222;
      color: white;
    }

    .dark canvas {
      background: #333;
      border: 2px solid white;
    }

    .pastel {
      background: #ffeef2;
    }

    .pastel canvas {
      background: #fff8fb;
      border: 2px solid #ff9bb3;
    }
  </style>
</head>
<body>

<h1>Simple Drawing Canvas</h1>

<div id="toolbar">
  <button onclick="setMode('draw')">Draw</button>
  <button onclick="setMode('erase')">Erase</button>
  <button onclick="clearCanvas()">Clear</button>

  <select onchange="changeStyle(this.value)">
    <option value="default">Default</option>
    <option value="dark">Dark Mode</option>
    <option value="pastel">Pastel</option>
  </select>
</div>

<canvas id="canvas" width="600" height="400"></canvas>

<script type="module">
  // =========================
  // FIREBASE IMPORTS
  // =========================
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
  import {
    getDatabase,
    ref,
    push,
    onChildAdded,
    remove,
    onValue
  } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js';

  // =========================
  // FIREBASE CONFIG
  // Replace this with YOUR config from Firebase
  // =========================
const firebaseConfig = {
  apiKey: "AIzaSyBoIhnx8vWOsZEJwMYBWJKGiDn9ructaGA",
  authDomain: "drawme-de623.firebaseapp.com",
  projectId: "drawme-de623",
  storageBucket: "drawme-de623.firebasestorage.app",
  messagingSenderId: "399233978572",
  appId: "1:399233978572:web:0f3deb478f72314f4b3269",
  measurementId: "G-Z10MF4D981"
};

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  // =========================
  // CANVAS SETUP
  // =========================
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');

  let drawing = false;
  let mode = 'draw';
  let lastX = 0;
  let lastY = 0;

  // =========================
  // START DRAWING
  // =========================
  canvas.addEventListener('mousedown', (e) => {
    drawing = true;

    const rect = canvas.getBoundingClientRect();
    lastX = e.clientX - rect.left;
    lastY = e.clientY - rect.top;
  });

  // =========================
  // STOP DRAWING
  // =========================
  canvas.addEventListener('mouseup', () => {
    drawing = false;
  });

  canvas.addEventListener('mouseleave', () => {
    drawing = false;
  });

  // =========================
  // DRAW EVENT
  // =========================
  canvas.addEventListener('mousemove', draw);

  function draw(e) {
    if (!drawing) return;

    const rect = canvas.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;

    const lineData = {
      x1: lastX,
      y1: lastY,
      x2: x,
      y2: y,
      mode: mode
    };

    // Draw locally
    renderLine(lineData);

    // Send to Firebase
    push(ref(db, 'lines'), lineData);

    lastX = x;
    lastY = y;
  }

  // =========================
  // RENDER LINE
  // =========================
  function renderLine(line) {
    ctx.beginPath();
    ctx.moveTo(line.x1, line.y1);
    ctx.lineTo(line.x2, line.y2);

    ctx.lineWidth = line.mode === 'draw' ? 3 : 20;
    ctx.lineCap = 'round';
    ctx.strokeStyle = line.mode === 'draw' ? 'black' : 'white';

    ctx.stroke();
  }

  // =========================
  // REALTIME LISTENER
  // =========================
  onChildAdded(ref(db, 'lines'), (snapshot) => {
    const line = snapshot.val();
    renderLine(line);
  });

  // =========================
  // BUTTON FUNCTIONS
  // =========================
  window.setMode = function(newMode) {
    mode = newMode;
  }

  window.clearCanvas = async function() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    await remove(ref(db, 'lines'));
  }

  // Re-clear everyone when database empties
  onValue(ref(db, 'lines'), (snapshot) => {
    if (!snapshot.exists()) {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
    }
  });

  window.changeStyle = function(style) {
    document.body.className = style === 'default' ? '' : style;
  }
</script>

</body>
</html>
