<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Drawing Canvas</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #f0f0f0;
    }

    h1 {
      margin-top: 20px;
    }

    #toolbar {
      margin: 10px;
    }

    button, select {
      padding: 8px;
      margin: 5px;
      cursor: pointer;
    }

    canvas {
      border: 2px solid black;
      background: white;
      cursor: crosshair;
    }

    
  </style>
</head>
<body>

<h1>Collaborative Drawing Game</h1>

<!-- LOBBY SCREEN -->
<div id="lobbyScreen">
  <h2>Lobby</h2>

  <button onclick="createRoom()">Create Room</button>

  <div style="margin-top: 20px;">
    <input id="roomInput" placeholder="Enter Room Code" />
    <button onclick="joinRoom()">Join Room</button>
  </div>
</div>

<!-- ROOM SCREEN -->
<div id="roomScreen" style="display:none;">
  <div id="lobbyControls" style="display:none;">
  <button onclick="startGame()">Start Game</button>
  <button onclick="leaveRoom()">Exit Room</button>
</div>

<p id="lobbyNotice"></p>

<div id="gameStatus"></div>
  <h3 id="countdownTimer" style="display:none;"></h3>
<h2 id="roundTimer" style="display:none;"></h2>
  <p id="lobbyNotice"></p>
  <h2 id="roomCodeText">Room Code: <span id="roomCodeDisplay"></span></h2>
  <h3>Players</h3>

  <ul id="playerList"></ul>

  <p id="playerCount"></p>
</div>

<div id="toolbar" style="display:none;">
  <button onclick="setMode('draw')">Draw</button>
  <button onclick="setMode('erase')">Erase</button>
  <button onclick="clearCanvas()">Clear My Drawings</button>

  
</div>

<h2 id="promptDisplay" style="display:none;"></h2>

<canvas id="canvas" width="600" height="400" style="display:none;"></canvas>

<script type="module">
  // =========================
  // FIREBASE IMPORTS
  // =========================
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
  import {
    getDatabase,
    ref,
    set,
    push,
    onChildAdded,
    remove,
    onValue,
    onDisconnect
  } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js';

  // =========================
  // ROOM SYSTEM VARIABLES
  // =========================

  let currentRoom = null;
  let currentPlayerName = `Player-${Math.floor(Math.random() * 1000)}`;

  // =========================
  // FIREBASE CONFIG
  // Replace this with YOUR config from Firebase
  // =========================
  const firebaseConfig = {
  apiKey: "AIzaSyBoIhnx8vWOsZEJwMYBWJKGiDn9ructaGA",
  authDomain: "drawme-de623.firebaseapp.com",
  databaseURL: "https://drawme-de623-default-rtdb.firebaseio.com",
  projectId: "drawme-de623",
  storageBucket: "drawme-de623.firebasestorage.app",
  messagingSenderId: "399233978572",
  appId: "1:399233978572:web:0f3deb478f72314f4b3269",
  measurementId: "G-Z10MF4D981"
};

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  // =========================
  // ROOM CODE GENERATOR
  // =========================

  function generateRoomCode() {
    const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
    let code = '';

    for (let i = 0; i < 6; i++) {
      code += chars.charAt(Math.floor(Math.random() * chars.length));
    }

    return code;
  }

  // =========================
  // ROOM CREATION
  // =========================

  window.createRoom = async function() {
    const roomCode = generateRoomCode();
    currentRoom = roomCode;

    await set(ref(db, `rooms/${roomCode}`), {
      gameState: 'LOBBY',
      players: {}
    });

    const playerRef = ref(db, `rooms/${roomCode}/players/${clientId}`);

    await set(playerRef, {
      name: currentPlayerName
    });

    // Reliable automatic cleanup on disconnect/tab close
    onDisconnect(playerRef).remove();

    enterRoom(roomCode);
  }

  // =========================
  // JOIN ROOM
  // =========================

  window.joinRoom = async function() {
    const roomCode = document
      .getElementById('roomInput')
      .value
      .trim()
      .toUpperCase();

    if (!roomCode) {
      alert('Enter a room code');
      return;
    }

    const roomRef = ref(db, `rooms/${roomCode}`);

    onValue(roomRef, async (snapshot) => {
      if (!snapshot.exists()) {
        alert('Room does not exist');
        return;
      }

      const roomData = snapshot.val();
      const players = roomData.players || {};

      if (Object.keys(players).length >= 7) {
        alert('Room is full');
        return;
      }

      const playerRef = ref(db, `rooms/${roomCode}/players/${clientId}`);

      await set(playerRef, {
        name: currentPlayerName
      });

      // Reliable automatic cleanup on disconnect/tab close
      onDisconnect(playerRef).remove();

      enterRoom(roomCode);

    }, {
      onlyOnce: true
    });
  }

  // =========================
  // ENTER ROOM
  // =========================

  function enterRoom(roomCode) {
    currentRoom = roomCode;

    document.getElementById('lobbyScreen').style.display = 'none';
    document.getElementById('roomScreen').style.display = 'block';
    document.getElementById('lobbyControls').style.display = 'block';

    document.getElementById('roomCodeDisplay').innerText = roomCode;

    synchronizeRoom(roomCode);
    synchronizeGameState(roomCode);
  }

  // =========================
  // ROOM SYNCHRONIZATION
  // =========================

  function synchronizeRoom(roomCode) {
    let previousPlayers = {};

    onValue(ref(db, `rooms/${roomCode}/players`), (snapshot) => {
      const players = snapshot.val() || {};

      const playerList = document.getElementById('playerList');
      playerList.innerHTML = '';

      const playerIds = Object.keys(players);

      // Detect players leaving
      for (const id in previousPlayers) {
        if (!players[id]) {
          document.getElementById('lobbyNotice').innerText =
            `${previousPlayers[id].name} left the lobby`;

          setTimeout(() => {
            document.getElementById('lobbyNotice').innerText = '';
          }, 3000);
        }
      }

      previousPlayers = players;

      playerIds.forEach(id => {
        const li = document.createElement('li');
        li.innerText = players[id].name;
        playerList.appendChild(li);
      });

      document.getElementById('playerCount').innerText =
        `${playerIds.length}/7 Players currently in lobby`;
    });
  }

  // =========================
  // GAME STATE VARIABLES
  // =========================

  let currentLeader = null;
  let currentPrompt = '';

  // New ordered leader system
  let leaderQueue = [];
  let currentRound = 0;

  // =========================
  // START GAME
  // =========================

  window.startGame = async function () {
  if (!currentRoom) return;

  const playersSnapshotRef = ref(db, `rooms/${currentRoom}/players`);

  onValue(playersSnapshotRef, async (snapshot) => {
    const players = snapshot.val() || {};
    const playerIds = Object.keys(players);

    if (playerIds.length < 2) {
      alert('Need at least 2 players');
      return;
    }

    // 1. Shuffle players (leader order)
    const shuffledQueue = [...playerIds].sort(() => Math.random() - 0.5);

    leaderQueue = shuffledQueue;
    currentRound = 0;
    currentLeader = leaderQueue[0];

    // 2. Save to Firebase
    await set(ref(db, `rooms/${currentRoom}/leaderQueue`), leaderQueue);
    await set(ref(db, `rooms/${currentRoom}/currentRound`), currentRound);
    await set(ref(db, `rooms/${currentRoom}/currentLeader`), currentLeader);

    // 3. Start game
    await set(ref(db, `rooms/${currentRoom}/gameState`), 'PROMPT');

  }, { onlyOnce: true });
};
  

  // =========================
  // GAME STATE SYNCHRONIZATION
  // =========================

  function synchronizeGameState(roomCode) {

    // Sync game state
    onValue(ref(db, `rooms/${roomCode}/gameState`), (snapshot) => {
      const gameState = snapshot.val();

      if (!gameState) return;

      renderGameScreen(gameState);
    });

    // Sync leader queue
    onValue(ref(db, `rooms/${roomCode}/leaderQueue`), (snapshot) => {
      leaderQueue = snapshot.val() || [];
    });

    // Sync current round
    onValue(ref(db, `rooms/${roomCode}/currentRound`), (snapshot) => {
      currentRound = snapshot.val() || 0;
    });

    // Sync current leader
    onValue(ref(db, `rooms/${roomCode}/currentLeader`), (snapshot) => {
      currentLeader = snapshot.val();
    });

    // Sync prompt
    onValue(ref(db, `rooms/${roomCode}/prompt`), (snapshot) => {
      currentPrompt = snapshot.val() || '';

      document.getElementById('promptDisplay').innerText =
        `Prompt: ${currentPrompt}`;
    });
  }

  // =========================
  // RENDER GAME SCREENS
  // =========================

  function renderGameScreen(gameState) {

    const gameStatus = document.getElementById('gameStatus');
    const canvas = document.getElementById('canvas');
    const toolbar = document.getElementById('toolbar');
    const promptDisplay = document.getElementById('promptDisplay');
    const roomCodeText = document.getElementById('roomCodeText');
    const playerList = document.getElementById('playerList');
    const playerCount = document.getElementById('playerCount');
    const lobbyControls = document.getElementById('lobbyControls');

    // Hide ALL lobby elements during active gameplay
    const inLobby = gameState === 'LOBBY';

    roomCodeText.style.display = inLobby ? 'block' : 'none';
    playerList.style.display = inLobby ? 'block' : 'none';
    playerCount.style.display = inLobby ? 'block' : 'none';
    lobbyControls.style.display = inLobby ? 'flex' : 'none';

    // Clear gameplay UI when returning to lobby
    if (inLobby) {
      canvas.style.display = 'none';
      toolbar.style.display = 'none';
      promptDisplay.style.display = 'none';
      document.getElementById('roundTimer').style.display = 'none';
      gameStatus.innerHTML = '';
    }

    // PROMPT PHASE
    if (gameState === 'PROMPT') {

      canvas.style.display = 'none';
      toolbar.style.display = 'none';
      promptDisplay.style.display = 'none';

      // Leader screen
      if (clientId === currentLeader) {
        gameStatus.innerHTML = `
          <h2>You are the leader!</h2>
          <input id="promptInput" placeholder="What should everyone draw?" />
          <button onclick="submitPrompt()">Submit Prompt</button>
        `;
      }

      // Waiting screen
      else {
        gameStatus.innerHTML = `
          <h2>The leader is thinking...</h2>
        `;
      }
    }

    // FINAL VOTING PHASE
    if (gameState === 'FINAL_VOTING') {

      canvas.style.display = 'none';
      toolbar.style.display = 'none';
      promptDisplay.style.display = 'none';

      gameStatus.innerHTML = `
        <h2>Final Voting Phase</h2>
        <p>Everyone has already become leader.</p>
        <button onclick="returnToLobby()">
          Play Again
        </button>
      `;
    }

    // DRAWING PHASE
    if (gameState === 'DRAWING') {

      startRoundTimer(30);

      gameStatus.innerHTML = `
        <h2>Everyone Draw!</h2>
      `;

      canvas.style.display = 'block';
      toolbar.style.display = 'flex';
      promptDisplay.style.display = 'block';
    }
  }

  // =========================
  // ROUND TIMER
  // =========================

  let roundInterval = null;

  function startRoundTimer(seconds) {

    const timer = document.getElementById('roundTimer');

    timer.style.display = 'block';

    // Prevent duplicated timers
    if (roundInterval) {
      clearInterval(roundInterval);
    }

    let remaining = seconds;

    timer.innerText = `Time Left: ${remaining}`;

    roundInterval = setInterval(async () => {

      remaining--;

      timer.innerText = `Time Left: ${remaining}`;

      // Round finished
      if (remaining <= 0) {

        clearInterval(roundInterval);

        timer.innerText = 'Round Finished!';

        // Advance ordered leader rotation
        currentRound++;

        // All players already became leader
        if (currentRound >= leaderQueue.length) {

          await set(
            ref(db, `rooms/${currentRoom}/gameState`),
            'FINAL_VOTING'
          );

          timer.innerText = 'Final Voting Phase!';
          return;
        }

        // Next leader in shuffled order
        currentLeader = leaderQueue[currentRound];

        await set(
          ref(db, `rooms/${currentRoom}/currentRound`),
          currentRound
        );

        await set(
          ref(db, `rooms/${currentRoom}/currentLeader`),
          currentLeader
        );

        await set(
          ref(db, `rooms/${currentRoom}/gameState`),
          'PROMPT'
        );
      }

    }, 1000);
  }

  // =========================
  // SUBMIT PROMPT
  // =========================

  window.submitPrompt = async function() {
    const prompt = document
      .getElementById('promptInput')
      .value
      .trim();

    if (!prompt) return;

    await set(ref(db, `rooms/${currentRoom}/prompt`), prompt);

    await set(ref(db, `rooms/${currentRoom}/gameState`), 'DRAWING');
  }

  // =========================
  // RETURN TO LOBBY
  // =========================

  window.returnToLobby = async function() {

    await set(
      ref(db, `rooms/${currentRoom}/gameState`),
      'LOBBY'
    );

    gameStatus.innerHTML = '';

    document.getElementById('roundTimer').style.display = 'none';
  }

  // =========================
  // LEAVE ROOM
  // =========================

  window.leaveRoom = async function() {

    // Prevent leaving during active game
    const gameStateSnapshotRef = ref(db, `rooms/${currentRoom}/gameState`);

    onValue(gameStateSnapshotRef, async (snapshot) => {

      const gameState = snapshot.val();

      if (gameState && gameState !== 'LOBBY') {
        alert('Cannot leave during an active match');
        return;
      }

    }, {
      onlyOnce: true
    });
    if (!currentRoom) return;

    await remove(ref(db, `rooms/${currentRoom}/players/${clientId}`));

    currentRoom = null;

    document.getElementById('roomScreen').style.display = 'none';
    document.getElementById('lobbyScreen').style.display = 'block';

    document.getElementById('playerList').innerHTML = '';
    document.getElementById('playerCount').innerText = '';
    document.getElementById('lobbyNotice').innerText = '';
  }

  // =========================
  // CANVAS SETUP
  // =========================
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');

  let drawing = false;

  // Session-based client ID
  // Generate a completely unique player session per browser tab.
  // Prevent duplicated tabs from inheriting the same identity.

  const navigationType =
    performance.getEntriesByType('navigation')[0]?.type;

  // Generate NEW identity for duplicated/new tabs
  if (
    navigationType !== 'reload' ||
    !sessionStorage.getItem('drawingClientId')
  ) {
    sessionStorage.setItem(
      'drawingClientId',
      crypto.randomUUID()
    );
  }

  let clientId = sessionStorage.getItem('drawingClientId');
  let mode = 'draw';
  let lastX = 0;
  let lastY = 0;

  // =========================
  // START DRAWING
  // =========================
  canvas.addEventListener('mousedown', (e) => {
    drawing = true;

    const rect = canvas.getBoundingClientRect();
    lastX = e.clientX - rect.left;
    lastY = e.clientY - rect.top;
  });

  // =========================
  // STOP DRAWING
  // =========================
  canvas.addEventListener('mouseup', () => {
    drawing = false;
  });

  canvas.addEventListener('mouseleave', () => {
    drawing = false;
  });

  // =========================
  // DRAW EVENT
  // =========================
  canvas.addEventListener('mousemove', draw);

  function draw(e) {
    if (!drawing) return;

    const rect = canvas.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;

    const lineData = {
      x1: lastX,
      y1: lastY,
      x2: x,
      y2: y,
      mode: mode,
      clientId: clientId
    };

    // Draw locally
    renderLine(lineData);

    // Send to Firebase
    push(ref(db, 'lines'), lineData);

    lastX = x;
    lastY = y;
  }

  // =========================
  // RENDER LINE
  // =========================
  function renderLine(line) {
    ctx.beginPath();
    ctx.moveTo(line.x1, line.y1);
    ctx.lineTo(line.x2, line.y2);

    ctx.lineWidth = line.mode === 'draw' ? 3 : 20;
    ctx.lineCap = 'round';
    ctx.strokeStyle = line.mode === 'draw' ? 'black' : 'white';

    ctx.stroke();
  }

  // =========================
  // REALTIME SYNCHRONIZATION
  // =========================

  // Store all active lines locally
  let allLines = {};

  // Prevent duplicate redraw spam
  let isRedrawing = false;

  // Full synchronization listener
  // Keeps every client perfectly aligned using a single source of truth
  onValue(ref(db, 'lines'), (snapshot) => {
    allLines = snapshot.val() || {};
    redrawCanvas();
  });

  // Redraw entire canvas from synchronized state
  function redrawCanvas() {
    if (isRedrawing) return;

    isRedrawing = true;

    requestAnimationFrame(() => {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      for (const key in allLines) {
        renderLine(allLines[key]);
      }

      isRedrawing = false;
    });
  }

  // =========================
  // BUTTON FUNCTIONS
  // =========================
  window.setMode = function(newMode) {
    mode = newMode;
  }

  window.clearCanvas = async function() {
    const keysToDelete = [];

    // Instantly update local synchronized state first
    for (const key in allLines) {
      if (allLines[key].clientId === clientId) {
        keysToDelete.push(key);
        delete allLines[key];
      }
    }

    // Immediate visual response
    redrawCanvas();

    // Then synchronize deletions to Firebase
    const deletePromises = keysToDelete.map(key =>
      remove(ref(db, `lines/${key}`))
    );

    await Promise.all(deletePromises);
  }

  

  
</script>

</body>
</html>
