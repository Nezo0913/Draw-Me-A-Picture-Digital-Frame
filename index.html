<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Drawing Canvas</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #f0f0f0;
    }

    h1 {
      margin-top: 20px;
    }

    #toolbar {
      margin: 10px;
    }

    button, select {
      padding: 8px;
      margin: 5px;
      cursor: pointer;
    }

    canvas {
      border: 2px solid black;
      background: white;
      cursor: crosshair;
    }

    
  </style>
</head>
<body>

<h1>Simple Drawing Canvas</h1>

<div id="toolbar">
  <button onclick="setMode('draw')">Draw</button>
  <button onclick="setMode('erase')">Erase</button>
  <button onclick="clearCanvas()">Clear My Drawings</button>

  
</div>

<canvas id="canvas" width="600" height="400"></canvas>

<script type="module">
  // =========================
  // FIREBASE IMPORTS
  // =========================
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
  import {
    getDatabase,
    ref,
    push,
    onChildAdded,
    remove,
    onValue
  } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js';

  // =========================
  // FIREBASE CONFIG
  // Replace this with YOUR config from Firebase
  // =========================
  const firebaseConfig = {
    apiKey: 'YOUR_API_KEY',
    authDomain: 'YOUR_AUTH_DOMAIN',
    databaseURL: 'YOUR_DATABASE_URL',
    projectId: 'YOUR_PROJECT_ID',
    storageBucket: 'YOUR_STORAGE_BUCKET',
    messagingSenderId: 'YOUR_MESSAGING_SENDER_ID',
    appId: 'YOUR_APP_ID'
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  // =========================
  // CANVAS SETUP
  // =========================
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');

  let drawing = false;

  // Unique temporary client ID
  const clientId = crypto.randomUUID();
  let mode = 'draw';
  let lastX = 0;
  let lastY = 0;

  // =========================
  // START DRAWING
  // =========================
  canvas.addEventListener('mousedown', (e) => {
    drawing = true;

    const rect = canvas.getBoundingClientRect();
    lastX = e.clientX - rect.left;
    lastY = e.clientY - rect.top;
  });

  // =========================
  // STOP DRAWING
  // =========================
  canvas.addEventListener('mouseup', () => {
    drawing = false;
  });

  canvas.addEventListener('mouseleave', () => {
    drawing = false;
  });

  // =========================
  // DRAW EVENT
  // =========================
  canvas.addEventListener('mousemove', draw);

  function draw(e) {
    if (!drawing) return;

    const rect = canvas.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;

    const lineData = {
      x1: lastX,
      y1: lastY,
      x2: x,
      y2: y,
      mode: mode,
      clientId: clientId
    };

    // Draw locally
    renderLine(lineData);

    // Send to Firebase
    push(ref(db, 'lines'), lineData);

    lastX = x;
    lastY = y;
  }

  // =========================
  // RENDER LINE
  // =========================
  function renderLine(line) {
    ctx.beginPath();
    ctx.moveTo(line.x1, line.y1);
    ctx.lineTo(line.x2, line.y2);

    ctx.lineWidth = line.mode === 'draw' ? 3 : 20;
    ctx.lineCap = 'round';
    ctx.strokeStyle = line.mode === 'draw' ? 'black' : 'white';

    ctx.stroke();
  }

  // =========================
  // REALTIME LISTENER
  // =========================
  onChildAdded(ref(db, 'lines'), (snapshot) => {
    const line = snapshot.val();
    renderLine(line);
  });

  // =========================
  // BUTTON FUNCTIONS
  // =========================
  window.setMode = function(newMode) {
    mode = newMode;
  }

  window.clearCanvas = async function() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Remove only this user's lines locally
    // Future versions can add persistent user IDs/authentication
    const snapshotRef = ref(db, 'lines');

    onValue(snapshotRef, async (snapshot) => {
      if (!snapshot.exists()) return;

      const data = snapshot.val();

      for (const key in data) {
        const line = data[key];

        // Only delete lines created by this client session
        if (line.clientId === clientId) {
          await remove(ref(db, `lines/${key}`));
        }
      }
    }, {
      onlyOnce: true
    });
  }

  // Re-clear everyone when database empties
  onValue(ref(db, 'lines'), (snapshot) => {
    if (!snapshot.exists()) {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
    }
  });

  
</script>

</body>
</html>
