<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Drawing Canvas</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #f0f0f0;
    }

    h1 {
      margin-top: 20px;
    }

    #toolbar {
      margin: 10px;
    }

    button, select {
      padding: 8px;
      margin: 5px;
      cursor: pointer;
    }

    canvas {
      border: 2px solid black;
      background: white;
      cursor: crosshair;
    }

    /* STYLE OPTIONS */
    .dark {
      background: #222;
      color: white;
    }

    .dark canvas {
      background: #333;
      border: 2px solid white;
    }

    .pastel {
      background: #ffeef2;
    }

    .pastel canvas {
      background: #fff8fb;
      border: 2px solid #ff9bb3;
    }
  </style>
</head>
<body>

<h1>Simple Drawing Canvas</h1>

<div id="toolbar">
  <button onclick="setMode('draw')">Draw</button>
  <button onclick="setMode('erase')">Erase</button>
  <button onclick="clearCanvas()">Clear</button>

  <select onchange="changeStyle(this.value)">
    <option value="default">Default</option>
    <option value="dark">Dark Mode</option>
    <option value="pastel">Pastel</option>
  </select>
</div>

<canvas id="canvas" width="600" height="400"></canvas>

<script>
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');

  let drawing = false;
  let mode = 'draw';

  canvas.addEventListener('mousedown', (e) => {
    drawing = true;

    const rect = canvas.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;

    // FIX: Start a new path at the exact click position
    ctx.beginPath();
    ctx.moveTo(x, y);
  });

  canvas.addEventListener('mouseup', () => {
    drawing = false;
    ctx.beginPath(); // reset path to avoid connecting lines
  });

  canvas.addEventListener('mousemove', draw);

  function draw(e) {
    if (!drawing) return;

    const rect = canvas.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;

    ctx.lineWidth = (mode === 'draw') ? 3 : 20;
    ctx.lineCap = 'round';

    if (mode === 'draw') {
      ctx.strokeStyle = 'black';
    } else {
      ctx.strokeStyle = 'white';
    }

    ctx.lineTo(x, y);
    ctx.stroke();
  }

  function setMode(newMode) {
    mode = newMode;
  }

  function clearCanvas() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
  }

  function changeStyle(style) {
    document.body.className = style === 'default' ? '' : style;
  }
</script>

</body>
</html>
